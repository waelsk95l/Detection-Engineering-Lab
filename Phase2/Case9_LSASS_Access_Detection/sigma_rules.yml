title: Suspicious LSASS Access
id: lsass-access-detection
status: experimental
description: Detects suspicious access to lsass.exe which may indicate credential dumping activity
author: Wael Saad Kamal
date: 2026/03/15

logsource:
  product: windows
  category: process_access

detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
  access:
    GrantedAccess:
      - '0x1fffff'
      - '0x1010'
      - '0x1410'
  condition: selection AND access

falsepositives:
  - Antivirus
  - EDR tools
  - Security monitoring tools

level: high

tags:
  - attack.credential_access
  - attack.t1003
  - attack.t1003.001
