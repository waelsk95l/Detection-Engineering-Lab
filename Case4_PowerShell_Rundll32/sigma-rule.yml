title: PowerShell Spawning Rundll32
id: powershell-rundll32-detection
status: experimental
description: Detects PowerShell spawning rundll32.exe which may indicate suspicious activity
author: Wael SK
date: 2026/03/09

logsource:
  product: windows
  service: security

detection:
  selection:
    EventID: 4688
    ParentProcessName|contains:
      - powershell.exe
    NewProcessName|contains:
      - rundll32.exe

condition: selection

falsepositives:
  - Administrative scripts

level: medium

tags:
  - attack.execution
  - attack.t1218.011
