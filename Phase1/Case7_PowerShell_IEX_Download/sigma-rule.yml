title: PowerShell IEX Download Cradle
id: 8c4f2d2f-ps-download-cradle
status: experimental
description: Detects PowerShell commands using IEX with Net.WebClient DownloadString which is commonly used for fileless malware execution.
author: Wael SK
date: 2026/03/11
logsource:
  product: windows
  service: security

detection:
  selection:
    EventID: 4688
    NewProcessName|endswith: '\powershell.exe'
    CommandLine|contains:
      - 'IEX'
      - 'DownloadString'
      - 'Net.WebClient'

  condition: selection

fields:
  - EventID
  - NewProcessName
  - CommandLine
  - ParentProcessName

falsepositives:
  - Administrative scripts
  - Automation tools

level: high
